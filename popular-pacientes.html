function log(html){
  const el=document.getElementById("log");
  el.innerHTML+=html;
  el.scrollTop=el.scrollHeight;
}

async function popular(){
  const btn=document.getElementById("btn");
  btn.disabled=true;btn.textContent="Cadastrando...";
  log('<div class="info">▶ Iniciando cadastro dos pacientes...</div>');

  // Verifica duplicatas por email/nome
  const snap = await db.collection("clinica_pacientes").get();
  const existentes = snap.docs.map(d=>d.data().nome?.toLowerCase());

  let ok=0,skip=0,err=0;
  for(const p of PACIENTES){
    if(existentes.includes(p.nome.toLowerCase())){
      log(`<div style="color:#9ca3af">⟳ Já existe: ${p.nome}</div>`);
      skip++;continue;
    }
    try{
      const email = p.email||`sem-email.${Date.now()}@interno.local`;
      await db.collection("clinica_pacientes").add({
        nome:p.nome,
        email,
        telefone:p.telefone||"",
        genero:p.genero||"Não informar",
        cpf:p.cpf||"",
        dataNascimento:"",
        status:"ativo",
        objetivosTerapeuticos:"",
        observacoesClinicas:"",
        senha:"",
        origem:"doctoralia",
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      ok++;
      log(`<div class="ok">✓ ${p.nome}${p.email?"":" (sem e-mail)"}</div>`);
    }catch(e){
      err++;
      log(`<div class="err">✗ ${p.nome}: ${e.message}</div>`);
    }
  }
  btn.textContent=`✅ Concluído! ${ok} cadastrados · ${skip} já existiam · ${err} erro(s)`;
  log(`<div class="info" style="margin-top:12px">
    ✅ Pronto! Acesse o admin → Pacientes para ver e completar CPF e data de nascimento.<br>
    🗑️ Apague este arquivo do repositório depois.
  </div>`);
}
