<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadastro — Dra. Lucia Kratz</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#f3e8ff 0%,#faf5ff 50%,#ede9fe 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:20px;padding:36px;width:100%;max-width:520px;box-shadow:0 8px 40px rgba(123,0,196,0.12)}
.logo{text-align:center;margin-bottom:28px}
h2{font-size:20px;color:#3d006a;margin-bottom:6px;font-weight:600}
.subtitle{font-size:13px;color:#6b7280;margin-bottom:28px}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
input,select{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;color:#1f2937;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:#7B00C4}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn{width:100%;padding:14px;background:#7B00C4;color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.6;cursor:default}
.success{text-align:center;padding:20px 0}
.success-icon{font-size:56px;margin-bottom:16px}
.success-title{font-size:20px;font-weight:700;color:#3d006a;margin-bottom:8px}
.success-msg{font-size:14px;color:#6b7280;line-height:1.6}
.optional{font-size:10px;color:#9ca3af;font-weight:400;margin-left:4px;text-transform:none;letter-spacing:0}
@media(max-width:480px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="../logo.png" alt="Dra. Lucia Kratz" style="height:70px;object-fit:contain;margin-bottom:8px"/>
    <span class="logo-name">Lucia Kratz</span>
    <span class="logo-sub">CRP 09/20590 · Psicóloga</span>
  </div>

  <div id="formArea">
    <h2>Bem-vindo(a)! 🦋</h2>
    <p class="subtitle">Preencha seus dados para começarmos. Todos os campos são opcionais.</p>

    <div class="form-group">
      <label>Nome completo <span class="optional">opcional</span></label>
      <input id="nome" type="text" placeholder="Seu nome completo"/>
    </div>
    <div class="grid">
      <div class="form-group">
        <label>E-mail <span class="optional">opcional</span></label>
        <input id="email" type="email" placeholder="seu@email.com"/>
      </div>
      <div class="form-group">
        <label>Telefone / WhatsApp <span class="optional">opcional</span></label>
        <input id="telefone" type="tel" placeholder="+55 (62) 9 9999-9999"/>
      </div>
    </div>
    <div class="grid">
      <div class="form-group">
        <label>Data de nascimento <span class="optional">opcional</span></label>
        <input id="dataNasc" type="date"/>
      </div>
      <div class="form-group">
        <label>CPF <span class="optional">opcional</span></label>
        <input id="cpf" type="text" placeholder="000.000.000-00"/>
      </div>
    </div>
    <div class="form-group">
      <label>Gênero <span class="optional">opcional</span></label>
      <select id="genero">
        <option value="">Prefiro não informar</option>
        <option value="Feminino">Feminino</option>
        <option value="Masculino">Masculino</option>
        <option value="Não binário">Não binário</option>
        <option value="Outro">Outro</option>
      </select>
    </div>

    <button class="btn" id="btnEnviar" onclick="enviar()">Enviar cadastro</button>
  </div>

  <div id="successArea" class="success" style="display:none">
    <div class="success-icon">🦋</div>
    <div class="success-title">Cadastro recebido!</div>
    <p class="success-msg">Seus dados foram enviados com sucesso.<br>A Dra. Lucia Kratz entrará em contato em breve para agendar sua consulta.<br><br>Obrigado pela confiança! 💜</p>
  </div>
</div>

<script>
const fc={apiKey:"AIzaSyDnrgaY8R0Zetkr18uHQJAZXIUa4EwDnv4",authDomain:"entrevista-inicial.firebaseapp.com",projectId:"entrevista-inicial"};
if(!firebase.apps.length)firebase.initializeApp(fc);
const db=firebase.firestore();

async function enviar(){
  const btn=document.getElementById("btnEnviar");
  btn.disabled=true;
  btn.textContent="Enviando...";
  try{
    await db.collection("clinica_pacientes").add({
      nome: document.getElementById("nome").value.trim()||"",
      email: document.getElementById("email").value.trim().toLowerCase()||"",
      telefone: document.getElementById("telefone").value.trim()||"",
      dataNascimento: document.getElementById("dataNasc").value||"",
      cpf: document.getElementById("cpf").value.trim()||"",
      genero: document.getElementById("genero").value||"",
      status:"pendente",
      origem:"autocadastro",
      modulosAtivos:["mod1"],
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById("formArea").style.display="none";
    document.getElementById("successArea").style.display="block";
  }catch(e){
    alert("Erro ao enviar. Tente novamente.");
    btn.disabled=false;
    btn.textContent="Enviar cadastro";
  }
}
</script>
</body>
</html>
