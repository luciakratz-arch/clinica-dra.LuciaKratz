<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Agenda da Sala</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f9fafb;color:#111}
:root{--purple:#7B00C4;--orange:#ea580c;--gray:#e5e7eb}

/* LOGIN */
.login{display:flex;min-height:100vh}
.login-left{width:320px;flex-shrink:0;background:linear-gradient(160deg,#7B00C4,#4a007a);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;gap:12px}
.login-left img{width:110px;height:110px;object-fit:contain;margin-bottom:8px}
.login-left h1{font-family:'Playfair Display',serif;font-size:24px;color:white}
.login-left p{font-size:13px;color:rgba(255,255,255,.7)}
.login-right{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:20px}
.profile-card{display:flex;align-items:center;gap:16px;padding:20px 24px;border-radius:14px;border:2px solid #e5e7eb;background:white;cursor:pointer;text-align:left;width:100%;max-width:440px;transition:all .2s}
.profile-card:hover{border-color:var(--purple);background:#f5f0ff}
.profile-card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.profile-card h3{font-size:15px;font-weight:700;margin-bottom:2px}
.profile-card p{font-size:12px;color:#6b7280}
.back-btn{background:none;border:none;cursor:pointer;color:#6b7280;font-size:13px;align-self:flex-start;padding:0}
.form-group{width:100%;max-width:440px}
.form-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;display:block;margin-bottom:4px}
.form-input{width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;outline:none}
.form-input:focus{border-color:var(--purple)}
.btn-primary{width:100%;max-width:440px;padding:12px;border-radius:10px;background:var(--purple);color:white;border:none;font-size:15px;font-weight:600;cursor:pointer}
.error{background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;padding:10px 14px;border-radius:10px;font-size:13px;width:100%;max-width:440px}

/* APP */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:linear-gradient(160deg,#7B00C4,#4a007a);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:10;transition:transform .3s}
.s-header{padding:18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1)}
.s-header img{width:36px;height:36px;object-fit:contain}
.s-title{font-size:13px;font-weight:600;color:white}
.s-sub{font-size:11px;color:rgba(255,255,255,.6)}
.s-user{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1)}
.s-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:white;flex-shrink:0}
.s-name{font-size:13px;font-weight:600;color:white}
.s-role{font-size:11px;color:rgba(255,255,255,.6)}
.s-legend{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.s-legend-title{font-size:10px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.s-legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.s-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.s-legend-name{font-size:12px;color:rgba(255,255,255,.8)}
.s-legend-you{font-size:10px;font-weight:700;margin-left:auto}
.s-footer{padding:10px 8px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:4px;margin-top:auto}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:none;background:none;color:rgba(255,255,255,.75);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;text-align:left;width:100%;text-decoration:none;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.12);color:white}
.nav-btn-danger:hover{background:rgba(220,38,38,.25);color:#fca5a5}
.pedidos-box{margin:8px;background:rgba(239,68,68,.15);border-radius:10px;padding:12px 14px}
.pedidos-title{font-size:12px;font-weight:700;color:#fca5a5;margin-bottom:10px}
.pedido-item{margin-bottom:10px}
.pedido-text{font-size:11px;color:rgba(255,255,255,.85);margin-bottom:6px}
.pedido-btns{display:flex;gap:6px}
.pedido-btn{flex:1;padding:5px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;color:white}

/* MAIN */
.main{margin-left:240px;padding:28px 32px;min-height:100vh}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700}
.page-sub{font-size:14px;color:#6b7280;margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s}
.btn-purple{background:var(--purple);color:white}
.btn-ghost{background:none;color:#6b7280;border:1.5px solid #e5e7eb}
.btn-ghost:hover{border-color:var(--purple);color:var(--purple)}

/* SEMANA */
.nav-semana{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.semana-label{flex:1;text-align:center;font-weight:600;font-size:15px}
.grade-wrap{overflow-x:auto;margin-bottom:28px}
.grade{width:100%;border-collapse:separate;border-spacing:4px;table-layout:fixed}
.dia-th{padding:10px 6px;text-align:center;border-radius:10px;border:1.5px solid #e5e7eb;background:white;font-weight:normal}
.dia-th.hoje{background:var(--purple);border-color:var(--purple)}
.dia-weekday{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#6b7280}
.dia-th.hoje .dia-weekday{color:rgba(255,255,255,.8)}
.dia-num{font-size:22px;font-weight:800;color:#1f2937;line-height:1.1}
.dia-th.hoje .dia-num{color:white}
.dia-mes{font-size:10px;color:#9ca3af}
.dia-th.hoje .dia-mes{color:rgba(255,255,255,.65)}
.dia-td{vertical-align:top;padding:4px;border-radius:10px;border:1.5px solid #e5e7eb;background:white;min-height:90px}
.dia-td.hoje{background:#faf5ff;border-color:rgba(123,0,196,.2)}
.dia-body{display:flex;flex-direction:column;gap:4px;min-height:80px}
.reserva-chip{border-radius:6px;padding:5px 7px;font-size:11px;border-left:3px solid}
.chip-title{font-weight:700;font-size:12px}
.chip-sub{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-tag{font-size:9px;opacity:.7}
.chip-btn{margin-top:4px;width:100%;font-size:10px;background:white;border-radius:4px;padding:2px 4px;cursor:pointer;font-family:'Inter',sans-serif;border:1px solid}
.add-btn{background:none;border:1px dashed #d1d5db;border-radius:6px;padding:6px;cursor:pointer;color:#9ca3af;font-size:14px;width:100%;margin-top:auto}
.add-btn:hover{border-color:var(--purple);color:var(--purple)}

/* PRÓXIMAS */
.proximas-title{font-weight:700;font-size:15px;margin-bottom:12px}
.card{background:white;border-radius:12px;border:1px solid #e5e7eb}
.reserva-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f3f4f6}
.reserva-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.reserva-data{font-weight:600;font-size:14px}
.reserva-hora{font-size:12px;color:#6b7280}
.reserva-actions{display:flex;gap:6px;margin-left:auto}
.empty{text-align:center;padding:32px;color:#6b7280;font-size:14px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal{background:white;border-radius:16px;padding:28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:#6b7280}
.tipo-reserva{margin-bottom:16px}
.tipo-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:8px;display:block}
.tipo-btns{display:flex;gap:8px}
.tipo-btn{flex:1;padding:12px 8px;border-radius:10px;border:2px solid #e5e7eb;background:white;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;text-align:center;transition:all .15s}
.tipo-info{margin-top:8px;font-size:12px;color:#059669;background:#f0fdf4;border-radius:8px;padding:8px 12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col2{grid-column:1/-1}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.conflito-box{background:#fef3c7;border:1.5px solid #f59e0b;border-radius:12px;padding:14px 18px;margin-bottom:16px}
.conflito-title{font-weight:700;color:#b45309;margin-bottom:4px}
.conflito-sub{font-size:13px;color:#92400e}
.cancel-option{padding:16px;border-radius:12px;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;width:100%;margin-bottom:10px}
.cancel-option h4{font-size:14px;font-weight:700;margin-bottom:3px}
.cancel-option p{font-size:12px}

/* LISTA VERTICAL (estilo Doctoralia) */
.lista-vertical{display:flex;flex-direction:column;gap:2px;margin-top:8px}
.lv-dia{display:flex;gap:0;margin-bottom:10px}
.lv-lateral{width:44px;flex-shrink:0;text-align:center;padding-top:8px}
.lv-weekday{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase}
.lv-num{font-size:18px;font-weight:800;color:#111827;margin-top:2px}
.lv-num-hoje{width:30px;height:30px;border-radius:50%;background:var(--purple);color:white;display:flex;align-items:center;justify-content:center;margin:2px auto 0;font-size:16px}
.lv-linha{width:2px;background:#e5e7eb;border-radius:2px;flex-shrink:0;margin:12px 10px 0 0}
.lv-linha-hoje{background:var(--purple)}
.lv-cards{flex:1;padding-top:4px;display:flex;flex-direction:column;gap:4px}
.lv-vazio{color:#d1d5db;font-size:12px;padding:8px 0}
.lv-card{border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:10px;justify-content:space-between}
.lv-card-titulo{font-size:14px;font-weight:700;line-height:1.3}
.lv-card-hora{font-size:12px;font-weight:600;margin-top:2px}
.lv-card-actions{flex-shrink:0}
.lv-btn{font-size:11px;background:white;border-radius:6px;padding:5px 10px;cursor:pointer;font-family:'Inter',sans-serif;border:1px solid;white-space:nowrap}
.lv-add{background:none;border:1px dashed #d1d5db;border-radius:8px;padding:6px;cursor:pointer;color:#9ca3af;font-size:12px;width:100%;margin-top:2px}
.lv-add:hover{border-color:var(--purple);color:var(--purple)}
.only-desktop{display:block}
.only-mobile{display:none}
@media(max-width:767px){
  .only-desktop{display:none !important}
  .only-mobile{display:block !important}
  .lista-vertical{margin-top:0}
}

/* MOBILE */
.mob-header{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:linear-gradient(90deg,#7B00C4,#4a007a);z-index:20;align-items:center;justify-content:space-between;padding:0 16px}
.mob-title{color:white;font-weight:700;font-size:15px}
.mob-menu-btn{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:4px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;z-index:20;padding:8px 0 12px}
.mob-nav-items{display:flex;justify-content:space-around}
.mob-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;font-size:10px;color:#6b7280;font-family:'Inter',sans-serif;padding:4px 12px}
.mob-nav-btn.active{color:#7B00C4}

@media(max-width:767px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mob-overlay.open{display:block}
  .mob-header{display:flex !important}
  .mob-nav{display:block !important}
  .main{margin-left:0 !important;padding:72px 16px 80px !important}
  .grade-wrap{overflow-x:auto}
  .grade{min-width:500px}
  .proximas-title{font-size:14px}
  .page-header{flex-direction:column;align-items:flex-start}
}
@media(min-width:768px){
  .main{margin-left:240px}
  .mob-header{display:none !important}
  .mob-nav{display:none !important}
}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script defer>
const firebaseConfig = {
  apiKey:"AIzaSyDnrgaY8R0Zetkr18uHQJAZXIUa4EwDnv4",
  authDomain:"entrevista-inicial.firebaseapp.com",
  projectId:"entrevista-inicial",
  storageBucket:"entrevista-inicial.firebasestorage.app",
  messagingSenderId:"437375609844",
  appId:"1:437375609844:web:2ed0e16a7da5d46c2e27a1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const SITE_URL = "https://luciakratz-arch.github.io/clinica-dra.LuciaKratz/";
const WA = { lucia:"5562991546757", thais:"5562995370858" };
const USUARIOS = {
  lucia:{ nome:"Lucia Kratz",    senha:"1234", cor:"#7B00C4", bg:"#f5f0ff" },
  thais:{ nome:"Thais Cordeiro", senha:"1234", cor:"#ea580c", bg:"#fff7ed" }
};

let state = {
  user:null, reservas:[], pedidos:[],
  semanaOffset:0,
  modal:null,       // null | "reserva" | "cancelar" | "conflito"
  editandoId:null,
  modalData:null,   // dados extras do modal
  form:{ data:"", horaInicio:"09:00", horaFim:"10:00", titulo:"", recorrencia:"unico" },
  etapaLogin:"perfil", userIdLogin:"", senhaLogin:"", erroLogin:""
};

function fmt(d){ return d.toISOString().split("T")[0]; }
function hoje(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function getDias(offset){
  const h=hoje(), ini=new Date(h);
  ini.setDate(h.getDate()-h.getDay()+(offset*7));
  return Array.from({length:7},(_,i)=>{ const d=new Date(ini); d.setDate(ini.getDate()+i); return d; });
}
function mesLabel(d){ return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"short"}); }
function setState(patch){ state={...state,...patch}; function toggleSidebar(){
  document.getElementById('sidebar-sala')?.classList.toggle('open');
  document.getElementById('mob-overlay')?.classList.toggle('open');
}
render(); }

// Firebase listeners
let unsubReservas=null, unsubPedidos=null;
function startListeners(userId){
  if(unsubReservas) unsubReservas();
  if(unsubPedidos)  unsubPedidos();
  unsubReservas = db.collection("sala_reservas").orderBy("data")
    .onSnapshot(s=>{ state.reservas=s.docs.map(d=>({id:d.id,...d.data()})); render(); });
  unsubPedidos = db.collection("sala_pedidos").where("status","==","pendente")
    .onSnapshot(s=>{ state.pedidos=s.docs.map(d=>({id:d.id,...d.data()})); render(); });
}

async function gravar(){
  const f = state.form;
  if(!f.data||!f.horaInicio||!f.horaFim){ alert("Preencha todos os campos."); return; }
  if(f.horaInicio>=f.horaFim){ alert("Início deve ser antes do fim."); return; }
  // conflito?
  const conflito = state.reservas.find(r=>
    r.data===f.data && r.id!==state.editandoId &&
    f.horaInicio<r.horaFim && f.horaFim>r.horaInicio
  );
  if(conflito){ setState({modal:"conflito",modalData:{conflito,form:{...f}}}); return; }
  await _gravar(f);
}

async function _gravar(f){
  const u = state.user;
  const base = {
    horaInicio:f.horaInicio, horaFim:f.horaFim, titulo:f.titulo||"",
    usuarioId:u.id, usuarioNome:u.nome, cor:u.cor,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  if(state.editandoId){
    await db.collection("sala_reservas").doc(state.editandoId).update(base);
  } else if(f.recorrencia==="recorrente"){
    const ini = new Date(f.data+"T00:00:00");
    const batch = db.batch();
    for(let w=0;w<12;w++){
      const d=new Date(ini); d.setDate(ini.getDate()+(w*7));
      const ref=db.collection("sala_reservas").doc();
      batch.set(ref,{...base,data:d.toISOString().split("T")[0],recorrenteRef:f.data});
    }
    await batch.commit();
  } else {
    await db.collection("sala_reservas").add({...base,data:f.data});
  }
  setState({modal:null,editandoId:null,form:{data:"",horaInicio:"09:00",horaFim:"10:00",titulo:"",recorrencia:"unico"}});
}

async function cancelarReserva(r){
  if(r.recorrenteRef){ setState({modal:"cancelar",modalData:r}); return; }
  if(!confirm("Cancelar esta reserva?")) return;
  await db.collection("sala_reservas").doc(r.id).delete();
}

async function confirmarCancelar(modo){
  const r = state.modalData;
  if(modo==="todas"){
    const snap = await db.collection("sala_reservas")
      .where("recorrenteRef","==",r.recorrenteRef)
      .where("usuarioId","==",r.usuarioId).get();
    const batch=db.batch();
    snap.docs.forEach(d=>{ if(d.data().data>=r.data) batch.delete(d.ref); });
    await batch.commit();
  } else {
    await db.collection("sala_reservas").doc(r.id).delete();
  }
  setState({modal:null,modalData:null});
}

async function pedirLiberacao(reserva){
  const waNum = WA[reserva.usuarioId]||WA.lucia;
  const data  = new Date(reserva.data+"T00:00:00").toLocaleDateString("pt-BR");
  const msg   = `Olá ${reserva.usuarioNome}! Você tem a sala das ${reserva.horaInicio} às ${reserva.horaFim} do dia ${data}. Posso usar esse horário? Responda: ${window.location.href}`;
  await db.collection("sala_pedidos").add({
    reservaId:reserva.id, de:state.user.id, deNome:state.user.nome,
    para:reserva.usuarioId, paraNome:reserva.usuarioNome,
    data:reserva.data, horaInicio:reserva.horaInicio, horaFim:reserva.horaFim,
    status:"pendente", createdAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`,"_blank");
  setState({modal:null,modalData:null});
}

async function responderPedido(pedidoId, aceitar){
  const p = state.pedidos.find(x=>x.id===pedidoId);
  if(!p) return;
  const waNum = WA[p.de]||WA.lucia;
  if(aceitar){
    await db.collection("sala_reservas").doc(p.reservaId).delete();
    window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(`${p.deNome}, liberei o horário das ${p.horaInicio} às ${p.horaFim}!`)}`,"_blank");
  } else {
    window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(`${p.deNome}, não consigo liberar das ${p.horaInicio} às ${p.horaFim}. Podemos tentar outro horário?`)}`,"_blank");
  }
  await db.collection("sala_pedidos").doc(pedidoId).update({status:aceitar?"aceito":"recusado"});
}

// RENDER
function render(){
  const s = state;
  const app = document.getElementById("app");

  // LOGIN
  if(!s.user){
    app.innerHTML = `
    <div class="login">
      <div class="login-left">
        <img src="../logo-transparente.png" onerror="this.style.display='none'"/>
        <h1>Agenda da Sala</h1>
        <p>Dra. Lucia Kratz · CRP 09/20590</p>
      </div>
      <div class="login-right">
        ${s.etapaLogin==="perfil" ? `
          <div style="width:100%;max-width:440px">
            <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:8px">Quem é você?</div>
            <div style="font-size:13px;color:#6b7280;margin-bottom:24px">Selecione seu perfil.</div>
          </div>
          ${Object.entries(USUARIOS).map(([id,u])=>`
            <button class="profile-card" onclick="escolher('${id}')">
              <div class="profile-card-icon" style="background:${u.bg};font-size:22px">📅</div>
              <div><h3 style="color:${u.cor}">${u.nome}</h3><p>Agenda compartilhada da sala</p></div>
              <span style="margin-left:auto;color:#9ca3af">›</span>
            </button>
          `).join("")}
          <a href="https://luciakratz-arch.github.io/clinica-dra.LuciaKratz/" style="font-size:12px;color:var(--purple)">← Voltar ao site</a>
        ` : `
          <button class="back-btn" onclick="setState({etapaLogin:'perfil',erroLogin:''})">← Voltar</button>
          ${s.erroLogin?`<div class="error">${s.erroLogin}</div>`:""}
          <div class="form-group">
            <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:${USUARIOS[s.userIdLogin]?.cor};margin-bottom:4px">${USUARIOS[s.userIdLogin]?.nome}</div>
            <div style="font-size:13px;color:#6b7280;margin-bottom:16px">Acesse a agenda compartilhada</div>
            <label class="form-label">Senha</label>
            <input class="form-input" type="password" id="senha-input" placeholder="••••"
              onkeydown="if(event.key==='Enter')fazerLogin()"/>
          </div>
          <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
        `}
      </div>
    </div>`;
    if(s.etapaLogin==="senha") setTimeout(()=>{ const el=document.getElementById("senha-input"); if(el)el.focus(); },50);
    return;
  }

  const u = s.user;
  const dias = getDias(s.semanaOffset);
  const hj = hoje();
  const pedidosParaMim = s.pedidos.filter(p=>p.para===u.id);

  app.innerHTML = `
  <div class="app">
    <!-- Header Mobile -->
    <div class="mob-header">
      <button class="mob-menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="mob-title">Agenda da Sala</div>
      <div style="width:32px"></div>
    </div>
    <!-- Overlay -->
    <div class="mob-overlay" id="mob-overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar-sala">
      <div class="s-header">
        <img src="../logo-transparente.png" style="width:36px;height:36px;object-fit:contain" onerror="this.style.display='none'"/>
        <div><div class="s-title">Agenda da Sala</div><div class="s-sub">Espaço compartilhado</div></div>
      </div>
      <div class="s-user">
        <div class="s-avatar" style="background:${u.cor}">${u.nome[0]}</div>
        <div style="flex:1"><div class="s-name">${u.nome}</div><div class="s-role">Psicóloga</div></div>
        ${renderBotaoNotif()}
      </div>
      <div class="s-legend">
        <div class="s-legend-title">Legenda</div>
        ${Object.entries(USUARIOS).map(([id,us])=>`
          <div class="s-legend-item">
            <div class="s-legend-dot" style="background:${us.cor}"></div>
            <span class="s-legend-name">${us.nome.split(" ")[0]}</span>
            ${id===u.id?`<span class="s-legend-you" style="color:${us.cor}">você</span>`:""}
          </div>
        `).join("")}
      </div>
      ${pedidosParaMim.length>0?`
        <div class="pedidos-box">
          <div class="pedidos-title">🔔 ${pedidosParaMim.length} pedido(s)</div>
          ${pedidosParaMim.map(p=>`
            <div class="pedido-item">
              <div class="pedido-text">${p.deNome.split(" ")[0]} quer ${p.horaInicio}–${p.horaFim}</div>
              <div class="pedido-btns">
                <button class="pedido-btn" style="background:#059669" onclick="responderPedido('${p.id}',true)">✓ Liberar</button>
                <button class="pedido-btn" style="background:#dc2626" onclick="responderPedido('${p.id}',false)">✗ Manter</button>
              </div>
            </div>
          `).join("")}
        </div>
      `:""}
      <div class="s-footer">
        <button class="nav-btn" onclick="abrirNova(new Date())">＋ Nova Reserva</button>

        <a href="https://luciakratz-arch.github.io/clinica-dra.LuciaKratz/" class="nav-btn" style="color:rgba(255,255,255,.7);text-decoration:none">← Voltar ao site</a>
        <button class="nav-btn nav-btn-danger" onclick="setState({user:null})">→ Sair</button>
      </div>
    </div>

    <div class="main">
      <div class="page-header">
        <div><div class="page-title">Agenda da Sala</div><div class="page-sub">Reservas do espaço compartilhado</div></div>
        <button class="btn btn-purple" onclick="abrirNova(new Date())">＋ Nova Reserva</button>
      </div>

      <div class="nav-semana">
        <button class="btn btn-ghost" style="padding:8px 12px" onclick="setState({semanaOffset:${s.semanaOffset-1}})">‹</button>
        <div class="semana-label">${mesLabel(dias[0])} — ${dias[6].toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"})}</div>
        <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px" onclick="setState({semanaOffset:0})">Hoje</button>
        <button class="btn btn-ghost" style="padding:8px 12px" onclick="setState({semanaOffset:${s.semanaOffset+1}})">›</button>
      </div>

      <!-- GRADE SEMANAL (desktop) -->
      <div class="grade-wrap only-desktop">
        <table class="grade">
          <thead>
            <tr>
              <th style="width:60px;border:none;background:none"></th>
              ${dias.map((dia,i)=>{
                const isHj = fmt(dia)===fmt(hj);
                const isPass = dia<hj;
                return `<th class="dia-th${isHj?" hoje":""}">
                  <div class="dia-weekday" ${!isHj&&isPass?'style="color:#9ca3af"':""}>${dia.toLocaleDateString("pt-BR",{weekday:"short"}).replace(".","").toUpperCase()}</div>
                  <div class="dia-num" ${!isHj&&isPass?'style="color:#9ca3af"':""}>${dia.getDate()}</div>
                  <div class="dia-mes">${dia.toLocaleDateString("pt-BR",{month:"short"})}</div>
                </th>`;
              }).join("")}
            </tr>
          </thead>
          <tbody>
            ${[
              {label:"☀️ Manhã",   ini:"06:00", fim:"12:00", bg:"#fffbeb"},
              {label:"🌤️ Tarde",   ini:"12:00", fim:"18:00", bg:"#f0f9ff"},
              {label:"🌙 Noite",   ini:"18:00", fim:"23:59", bg:"#f5f3ff"}
            ].map(periodo=>`
              <tr>
                <td style="vertical-align:middle;padding:4px 6px 4px 0;text-align:right;white-space:nowrap;font-size:11px;font-weight:600;color:#6b7280;border:none;background:none">${periodo.label}</td>
                ${dias.map(dia=>{
                  const isHj = fmt(dia)===fmt(hj);
                  const diaFmt = fmt(dia);
                  const lista = s.reservas
                    .filter(r=>r.data===diaFmt && r.horaInicio>=periodo.ini && r.horaInicio<periodo.fim)
                    .sort((a,b)=>a.horaInicio.localeCompare(b.horaInicio));
                  return `<td class="dia-td${isHj?" hoje":""}" style="background:${isHj?periodo.bg+"cc":periodo.bg}">
                    <div class="dia-body">
                      ${lista.map(r=>{
                        const eMinha = r.usuarioId===u.id;
                        const cor = r.usuarioId==="lucia"?"#7B00C4":"#ea580c";
                        const bg  = r.usuarioId==="lucia"?"#f5f0ff":"#fff7ed";
                        return `<div class="reserva-chip" style="background:${bg};border-color:${cor}">
                          <div class="chip-title" style="color:${cor}">${r.horaInicio}–${r.horaFim}</div>
                          <div class="chip-sub">${eMinha?(r.titulo||"Minha reserva"):"Ocupado — "+r.usuarioNome.split(" ")[0]}</div>
                          ${r.recorrenteRef?`<div class="chip-tag" style="color:${cor}">↻ recorrente</div>`:""}
                          ${eMinha?`
                            <button class="chip-btn" style="color:#dc2626;border-color:#fca5a5" onclick="cancelarReservaById('${r.id}')">Cancelar</button>
                          `:`
                            <button class="chip-btn" style="color:${cor};border-color:${cor}" onclick="pedirLiberacaoById('${r.id}')">Pedir horário</button>
                          `}
                        </div>`;
                      }).join("")}
                      <button class="add-btn" onclick="abrirNovaDia('${diaFmt}')">+</button>
                    </div>
                  </td>`;
                }).join("")}
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>

      <!-- LISTA VERTICAL (sempre — base no mobile, complemento no desktop) -->
      <div class="proximas-title only-mobile" style="margin-top:8px">Próximos 14 dias</div>
      <div class="lista-vertical">
        ${(()=>{
          // 14 dias a partir de hoje
          const dias14 = Array.from({length:14},(_,i)=>{ const d=new Date(hj); d.setDate(hj.getDate()+i); return d; });
          const DIAS_SEMANA = ["DOM","SEG","TER","QUA","QUI","SEX","SÁB"];
          return dias14.map(dia=>{
            const diaStr = fmt(dia);
            const isHj = diaStr===fmt(hj);
            const lista = s.reservas.filter(r=>r.data===diaStr).sort((a,b)=>a.horaInicio.localeCompare(b.horaInicio));
            if(lista.length===0 && !isHj) return "";
            return `
              <div class="lv-dia">
                <div class="lv-lateral">
                  <div class="lv-weekday" style="${isHj?'color:var(--purple)':''}">${DIAS_SEMANA[dia.getDay()]}</div>
                  <div class="lv-num ${isHj?'lv-num-hoje':''}">${dia.getDate()}</div>
                </div>
                <div class="lv-linha ${isHj?'lv-linha-hoje':''}"></div>
                <div class="lv-cards">
                  ${lista.length===0
                    ? `<div class="lv-vazio">Sem reservas</div>`
                    : lista.map(r=>{
                        const eMinha = r.usuarioId===u.id;
                        const cor = r.usuarioId==="lucia"?"#7B00C4":"#ea580c";
                        const bg  = r.usuarioId==="lucia"?"#f5f0ff":"#fff7ed";
                        return `
                        <div class="lv-card" style="background:${bg};border-left:4px solid ${cor}">
                          <div class="lv-card-main">
                            <div class="lv-card-titulo" style="color:#111827">${eMinha?(r.titulo||"Minha reserva"):"Ocupado — "+r.usuarioNome.split(" ")[0]}</div>
                            <div class="lv-card-hora" style="color:${cor}">${r.horaInicio} – ${r.horaFim}${r.recorrenteRef?' · ↻ recorrente':''}</div>
                          </div>
                          <div class="lv-card-actions">
                            ${eMinha
                              ? `<button class="lv-btn" style="color:#dc2626;border-color:#fca5a5" onclick="cancelarReservaById('${r.id}')">Cancelar</button>`
                              : `<button class="lv-btn" style="color:${cor};border-color:${cor}" onclick="pedirLiberacaoById('${r.id}')">Pedir horário</button>`
                            }
                          </div>
                        </div>`;
                      }).join("")
                  }
                  <button class="lv-add" onclick="abrirNovaDia('${diaStr}')">+ Reservar</button>
                </div>
              </div>
            `;
          }).join("");
        })()}
      </div>

  <!-- Nav Mobile -->  <!-- Nav Mobile -->
  <div class="mob-nav">
    <div class="mob-nav-items">
      <button class="mob-nav-btn" onclick="setState({semanaOffset:0})">📅<span>Hoje</span></button>
      <button class="mob-nav-btn" onclick="abrirNova(new Date())">＋<span>Reservar</span></button>
      <button class="mob-nav-btn" onclick="setState({user:null})">→<span>Sair</span></button>
    </div>
  </div>

  ${s.modal==="reserva"?renderModalReserva():""}
  ${s.modal==="cancelar"?renderModalCancelar():""}
  ${s.modal==="conflito"?renderModalConflito():""}
  `;
}

function renderModalReserva(){
  const f = state.form;
  const u = state.user;
  const editando = !!state.editandoId;
  return `
  <div class="modal-bg" onclick="fecharModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">
        ${editando?"Editar Reserva":"Nova Reserva"}
        <button class="modal-close" onclick="setState({modal:null,editandoId:null})">×</button>
      </div>

      ${!editando?`
      <div class="tipo-reserva">
        <span class="tipo-label">Tipo de reserva</span>
        <div class="tipo-btns">
          <button class="tipo-btn" id="btn-unico"
            style="border-color:${f.recorrencia==="unico"?(u?.cor||"#7B00C4"):"#e5e7eb"};background:${f.recorrencia==="unico"?(u?.cor||"#7B00C4")+"18":"white"};color:${f.recorrencia==="unico"?(u?.cor||"#7B00C4"):"#6b7280"}"
            onclick="setRecorrencia('unico')">📅 Só este dia</button>
          <button class="tipo-btn" id="btn-recorrente"
            style="border-color:${f.recorrencia==="recorrente"?"#059669":"#e5e7eb"};background:${f.recorrencia==="recorrente"?"#05966918":"white"};color:${f.recorrencia==="recorrente"?"#059669":"#6b7280"}"
            onclick="setRecorrencia('recorrente')">🔁 Toda semana (12 sem.)</button>
        </div>
        ${f.recorrencia==="recorrente"?`<div class="tipo-info">✓ Bloqueia este mesmo dia da semana por 12 semanas consecutivas</div>`:""}
      </div>
      `:""}

      <div class="grid2">
        <div class="col2">
          <label class="form-label">Data</label>
          <input class="form-input" type="date" value="${f.data}" oninput="updateForm('data',this.value)"/>
        </div>
        <div>
          <label class="form-label">Início</label>
          <input class="form-input" type="time" value="${f.horaInicio}" oninput="updateForm('horaInicio',this.value)"/>
        </div>
        <div>
          <label class="form-label">Fim</label>
          <input class="form-input" type="time" value="${f.horaFim}" oninput="updateForm('horaFim',this.value)"/>
        </div>
        <div class="col2">
          <label class="form-label">Título (opcional)</label>
          <input class="form-input" value="${f.titulo}" placeholder="Ex: Sessão, Supervisão..." oninput="updateForm('titulo',this.value)"/>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="setState({modal:null,editandoId:null})">Cancelar</button>
        <button class="btn btn-purple" style="background:${u?.cor||'#7B00C4'}" onclick="gravar()">${editando?"Salvar":"Reservar"}</button>
      </div>
    </div>
  </div>`;
}

function renderModalCancelar(){
  const r = state.modalData;
  const dataFmt = new Date(r.data+"T00:00:00").toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long"});
  const dataFmt2 = new Date(r.data+"T00:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"long"});
  return `
  <div class="modal-bg" onclick="fecharModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">
        Cancelar Reserva
        <button class="modal-close" onclick="setState({modal:null,modalData:null})">×</button>
      </div>
      <p style="font-size:14px;color:#6b7280;margin-bottom:20px;line-height:1.6">Esta é uma reserva recorrente. O que deseja cancelar?</p>
      <button class="cancel-option" style="border:1.5px solid #e5e7eb;background:white" onclick="confirmarCancelar('esta')">
        <h4>Só esta reserva</h4>
        <p style="color:#6b7280">Cancela apenas ${dataFmt}</p>
      </button>
      <button class="cancel-option" style="border:1.5px solid #fca5a5;background:#fef2f2" onclick="confirmarCancelar('todas')">
        <h4 style="color:#dc2626">Esta e as próximas</h4>
        <p style="color:#dc2626;opacity:.8">Cancela a partir de ${dataFmt2} em diante</p>
      </button>
      <div style="display:flex;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="setState({modal:null,modalData:null})">Voltar</button>
      </div>
    </div>
  </div>`;
}

function renderModalConflito(){
  const c = state.modalData?.conflito;
  return `
  <div class="modal-bg" onclick="fecharModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">
        ⚠️ Conflito de Horário
        <button class="modal-close" onclick="setState({modal:null,modalData:null})">×</button>
      </div>
      <div class="conflito-box">
        <div class="conflito-title">Horário já reservado</div>
        <div class="conflito-sub">${c?.usuarioNome} tem a sala das ${c?.horaInicio} às ${c?.horaFim} neste dia.</div>
      </div>
      <p style="font-size:14px;color:#6b7280;margin-bottom:20px;line-height:1.6">
        Você pode pedir a liberação via WhatsApp. ${c?.usuarioNome?.split(" ")[0]} pode liberar ou manter.
      </p>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="setState({modal:null,modalData:null})">Cancelar</button>
        <button class="btn btn-purple" style="background:#d97706" onclick="pedirLiberacaoById('${c?.id}',true)">💬 Pedir via WhatsApp</button>
      </div>
    </div>
  </div>`;
}

// Helpers globais
function fecharModal(e){ if(e.target===e.currentTarget) setState({modal:null,editandoId:null,modalData:null}); }
function escolher(id){ setState({etapaLogin:"senha",userIdLogin:id,erroLogin:"",senhaLogin:""}); }
function fazerLogin(){
  const senhaDigitada = document.getElementById("senha-input")?.value || state.senhaLogin;
  const u = USUARIOS[state.userIdLogin];
  if(!u||senhaDigitada!==u.senha){ setState({erroLogin:"Senha incorreta."}); return; }
  const user = {id:state.userIdLogin,...u};
  startListeners(user.id);
  setState({user,etapaLogin:"perfil",senhaLogin:"",erroLogin:""});
}
function abrirNova(dia){
  const d = dia instanceof Date ? dia : new Date();
  setState({modal:"reserva",editandoId:null,form:{data:fmt(d),horaInicio:"09:00",horaFim:"10:00",titulo:"",recorrencia:"unico"}});
}
function abrirNovaDia(dataStr){
  setState({modal:"reserva",editandoId:null,form:{data:dataStr,horaInicio:"09:00",horaFim:"10:00",titulo:"",recorrencia:"unico"}});
}
function editarReserva(id){
  const r = state.reservas.find(x=>x.id===id);
  if(!r||r.usuarioId!==state.user.id) return;
  setState({modal:"reserva",editandoId:id,form:{data:r.data,horaInicio:r.horaInicio,horaFim:r.horaFim,titulo:r.titulo||"",recorrencia:"unico"}});
}
function cancelarReservaById(id){ const r=state.reservas.find(x=>x.id===id); if(r) cancelarReserva(r); }
function pedirLiberacaoById(id, fromConflito){
  const r = state.reservas.find(x=>x.id===id);
  if(r) pedirLiberacao(r);
}
function updateForm(key,val){ setState({form:{...state.form,[key]:val}}); }
function setRecorrencia(val){ setState({form:{...state.form,recorrencia:val}}); }

// ─── NOTIFICAÇÕES PUSH ───────────────────────────────────
function renderBotaoNotif() {
  if (!("Notification" in window)) return "";
  const p = Notification.permission;
  if (p === "granted") return `<span style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:20px;padding:5px 12px;font-size:12px;white-space:nowrap">🔔 Ativo</span>`;
  if (p === "denied")  return `<span style="background:rgba(255,0,0,0.15);border:1px solid rgba(255,0,0,0.3);color:#fca5a5;border-radius:20px;padding:5px 12px;font-size:12px">🔕 Bloqueado</span>`;
  return `<button onclick="ativarNotif()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap">🔔 Ativar</button>`;
}

function fmtDataNotifSala(dataStr) {
  if (!dataStr) return "";
  return new Date(dataStr+"T00:00:00").toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"2-digit"});
}

function enviarPush(titulo, corpo) {
  if (Notification.permission === "granted") {
    new Notification(titulo, { body: corpo, icon: "../logo-transparente.png" });
  }
}

function verificarLembretes() {
  const u = state.user;
  if (!u) return;
  const hj = fmt(new Date());
  const amanha = fmt(new Date(Date.now() + 86400000));
  state.reservas.filter(r => r.usuarioId===u.id && (r.data===hj||r.data===amanha)).forEach(r => {
    const dia = r.data===hj ? "Hoje" : "Amanhã";
    enviarPush(`${dia} — Sala ${r.horaInicio}–${r.horaFim}`, fmtDataNotifSala(r.data));
  });
  state.pedidos.filter(p => p.para===u.id).forEach(p => {
    enviarPush(`${p.deNome} quer a sala`, `${fmtDataNotifSala(p.data)} · ${p.horaInicio}–${p.horaFim}`);
  });
}

async function ativarNotif() {
  if (!("Notification" in window)) { alert("Seu navegador não suporta notificações."); return; }
  const p = await Notification.requestPermission();
  if (p === "granted") verificarLembretes();
  render();
}

render();
</script>
